<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --bg-surface: #121212;
            --spotify-green: #1DB954;
            --text-white: #FFFFFF;
            --text-gray: #B3B3B3;
            --bar-bg: #4d4d4d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-black);
            color: var(--text-white);
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100dvh;
            background-color: var(--bg-surface);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .search-container {
            padding: 12px 12px 4px 12px;
            flex-shrink: 0;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 25px;
            border: none;
            background-color: #2a2a2a;
            color: white;
            font-size: 15px;
            outline: none;
            transition: background 0.3s;
        }

        .search-input:focus {
            background-color: #333;
        }

        .playlist {
            list-style: none;
            margin: 0;
            padding: 0 0 10px 0;
            flex: 1 1 auto;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-thumb { background-color: #444; border-radius: 4px; }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .playlist-item:hover {
            background-color: #282828;
        }

        .playlist-item.playing-active {
            background-color: #222;
        }

        .song-name {
            font-size: 15px;
            color: var(--text-white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 85%;
        }

        .playing-active .song-name {
            color: var(--spotify-green);
            font-weight: 600;
        }

        .equalizer {
            display: none;
            align-items: flex-end;
            height: 15px;
            gap: 3px;
        }

        .playing-active .equalizer {
            display: flex;
        }

        .bar {
            width: 3px;
            background-color: var(--spotify-green);
            animation: bounce 0.5s infinite ease-in-out alternate;
        }
        .bar:nth-child(1) { height: 10px; animation-delay: 0s; }
        .bar:nth-child(2) { height: 16px; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 8px; animation-delay: 0.4s; }
        @keyframes bounce { 0% { height: 3px; } 100% { height: 16px; } }

        .player-area {
            background-color: #181818;
            padding: 15px 20px 25px 20px;
            border-top: 1px solid #282828;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .current-info {
            text-align: center;
            margin-bottom: 5px;
        }

        .current-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .progress-bar {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--bar-bg);
            border-radius: 2px;
            cursor: pointer;
            outline: none;
            background-image: linear-gradient(var(--spotify-green), var(--spotify-green));
            background-size: 0% 100%;
            background-repeat: no-repeat;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-bar:hover::-webkit-slider-thumb {
            opacity: 1;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-gray);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            margin-top: 5px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            color: white;
            transform: scale(1.1);
        }

        .btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .btn-play {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            color: black !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-play:hover {
            transform: scale(1.05);
            background: var(--spotify-green);
        }

        .btn.active-mode {
            color: var(--spotify-green);
            position: relative;
        }

        .btn.active-mode::after {
            content: '•';
            position: absolute;
            bottom: -12px;
            font-size: 20px;
            color: var(--spotify-green);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search songs..." onkeyup="searchSongs()">
        </div>

        <ul class="playlist" id="playlist"></ul>

        <div class="player-area">
            <div class="current-info">
                <div class="current-title" id="currentTitle">Select a song</div>
            </div>

            <div class="progress-container">
                <input type="range" value="0" class="progress-bar" id="progressBar">
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="totalDuration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn" id="shuffleBtn" title="Shuffle">
                    <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"></path></svg>
                </button>

                <button class="btn" id="prevBtn">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"></path></svg>
                </button>

                <button class="btn btn-play" id="playPauseBtn">
                    <svg id="playIcon" viewBox="0 0 24 24" style="width:30px; height:30px;"><path d="M8 5v14l11-7z"></path></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="width:30px; height:30px; display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>
                </button>

                <button class="btn" id="nextBtn">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path></svg>
                </button>

                <button class="btn active-mode" id="orderBtn" title="Order">

                </button>
            </div>
        </div>
    </div>

        let playlist = [...rawPlaylist];
        let currentSongIndex = 0;
        let isShuffle = false;
        let playedHistory = [];

        const audio = new Audio();

        const titleEl = document.getElementById('currentTitle');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalDurationEl = document.getElementById('totalDuration');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playlistContainer = document.getElementById('playlist');

        function init() {
            renderPlaylist();
        }

        function renderPlaylist(songs = playlist) {
            playlistContainer.innerHTML = '';
            songs.forEach(song => {
                const isActive = (playlist[currentSongIndex].src === song.src) && (audio.src !== '');
                const li = document.createElement('li');
                li.classList.add('playlist-item');
                if (isActive) li.classList.add('playing-active');

                li.innerHTML = `
                    <span class="song-name">${song.name}</span>
                    <div class="equalizer">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                `;

                li.onclick = () => {
                    const mainIndex = playlist.findIndex(s => s.src === song.src);
                    currentSongIndex = mainIndex;
                    if (isShuffle && !playedHistory.includes(mainIndex)) playedHistory.push(mainIndex);
                    loadSong(currentSongIndex);
                    playSong();
                };
                playlistContainer.appendChild(li);
            });
        }

        function loadSong(index) {
            const song = playlist[index];
            audio.src = song.src;
            updateMediaSession(song);
            titleEl.innerText = song.name;
            progressBar.value = 0;
            progressBar.style.backgroundSize = '0% 100%';
            currentTimeEl.innerText = "0:00";
            totalDurationEl.innerText = "...";
            renderPlaylist(getVisibleSongs());
            
        }

        function playSong() {
            audio.play();
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            renderPlaylist(getVisibleSongs());
        }

        function pauseSong() {
            audio.pause();
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        }

        function togglePlay() {
            if (audio.paused) {
                if (!audio.src) loadSong(currentSongIndex);
                playSong();
            } else {
                pauseSong();
            }
        }

        function nextSong() {
            if (isShuffle) {
                if (playedHistory.length >= playlist.length) playedHistory = [];
                let randomIndex;
                if (playlist.length <= 1) randomIndex = 0;
                else {
                    do {
                        randomIndex = Math.floor(Math.random() * playlist.length);
                    } while (playedHistory.includes(randomIndex));
                }
                currentSongIndex = randomIndex;
                playedHistory.push(currentSongIndex);
            } else {
                currentSongIndex = (currentSongIndex + 1) % playlist.length;
            }
            loadSong(currentSongIndex);
            playSong();
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            playSong();
        }

        function searchSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = playlist.filter(s => s.name.toLowerCase().includes(query));
            renderPlaylist(filtered);
        }

        function getVisibleSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            return playlist.filter(s => s.name.toLowerCase().includes(query));
        }

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function updateProgress() {
            const duration = audio.duration;
            const currentTime = audio.currentTime;
            if (isNaN(duration)) return;
            const percent = (currentTime / duration) * 100;
            progressBar.value = percent;
            progressBar.style.backgroundSize = `${percent}% 100%`;
            currentTimeEl.innerText = formatTime(currentTime);
            totalDurationEl.innerText = formatTime(duration);
        }

        playPauseBtn.onclick = togglePlay;
        document.getElementById('nextBtn').onclick = nextSong;
        document.getElementById('prevBtn').onclick = prevSong;

        document.getElementById('shuffleBtn').onclick = function() {
            isShuffle = true;
            this.classList.add('active-mode');
            document.getElementById('orderBtn').classList.remove('active-mode');
            playedHistory = [currentSongIndex];
        };

        document.getElementById('orderBtn').onclick = function() {
            isShuffle = false;
            this.classList.add('active-mode');
            document.getElementById('shuffleBtn').classList.remove('active-mode');
        };

        audio.onended = nextSong;
        audio.ontimeupdate = updateProgress;
        audio.onloadedmetadata = () => {
            totalDurationEl.innerText = formatTime(audio.duration);
        };

        progressBar.oninput = function() {
            const val = this.value;
            this.style.backgroundSize = `${val}% 100%`;
            currentTimeEl.innerText = formatTime((val / 100) * audio.duration);
        };

        progressBar.onchange = function() {
            audio.currentTime = (this.value / 100) * audio.duration;
        };

        function updateMediaSession(song) {
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: song.name,
            artist: "Music Player",
            album: "Playlist",
            artwork: [
                { src: "https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg", sizes: "96x96", type: "image/png" },
                { src: "https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg", sizes: "192x192", type: "image/png" },
                { src: "https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg", sizes: "512x512", type: "image/png" }
            ]
        });

        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        navigator.mediaSession.setActionHandler('nexttrack', () => nextSong());
        navigator.mediaSession.setActionHandler('previoustrack', () => prevSong());
    }
}

        init();
    </script>
</body>
</html>
